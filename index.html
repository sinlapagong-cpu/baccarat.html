<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Jansi888 AI</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg,#020617,#0f172a);
      color: white;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
    }

    .container {
      margin-top: 50px;

      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .banker { background: #ef4444; color: white; }
    .player { background: #3b82f6; color: white; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Jansi888 AI</h1>
    <p>ทดลองเว็บของคุณ</p>

    <button class="banker">BANKER</button>

  </div>
</body>
</html>
