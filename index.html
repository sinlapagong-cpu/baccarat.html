<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANSI888 AI VIP PRO</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #05080f; color: white; text-align: center; display: none; }
        .header { background: linear-gradient(180deg, #16213e 0%, #05080f 100%); padding: 15px; border-bottom: 2px solid #4ecca3; }
        
        .container { max-width: 450px; margin: auto; padding: 10px; }
        
        /* Big Road Styling */
        .bigroad-container {
            background: #111827;
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid #334155;
        }
        .bigroad {
            display: grid;
            grid-template-columns: repeat(20, 28px);
            grid-template-rows: repeat(6, 28px);
            gap: 2px;
            justify-content: start;
        }
        .coin {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: white;
        }
        .red { background: #ef4444; box-shadow: 0 0 5px #ef4444; }
        .blue { background: #3b82f6; box-shadow: 0 0 5px #3b82f6; }

        /* Dashboard */
        .card { background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid #4ecca3; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        button { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; }
        .btn-p { background: #3b82f6; }
        .btn-b { background: #ef4444; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 0.9rem; }
        .stat-item { background: #0f172a; padding: 10px; border-radius: 8px; }
        
        .predict-title { font-size: 1.1rem; color: #4ecca3; margin-bottom: 5px; }
        .next-move { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .warning { color: #f7d794; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.4;} }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div class="header">
        <h1>JANSI888 AI PRO</h1>
        <div id="status" class="warning">⚠️ กรุณากรอกผล 4 ตาแรก</div>
    </div>

    <div class="bigroad-container">
        <div class="bigroad" id="road"></div>
    </div>

    <div class="card">
        <div class="predict-title">🎯 AI PREDICTION</div>
        <div id="next" class="next-move">?</div>
        <div id="percent" style="font-weight: bold; color: #4ecca3;">ความแม่นยำ: --%</div>
        
        <div class="stat-grid">
            <div class="stat-item">💰 แทง: <span id="money" style="color:#4ecca3">--</span></div>
            <div class="stat-item">🔁 ไม้: <span id="stepDisplay">--</span></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-p" onclick="add('P')">Player</button>
        <button class="btn-b" onclick="add('B')">Banker</button>
    </div>

    <div class="stat-grid" style="grid-template-columns: 1fr 1fr 1fr;">
        <div class="stat-item">ทั้งหมด: <span id="total">0</span></div>
        <div class="stat-item">ถูก: <span id="wins" style="color:#4ecca3">0</span></div>
        <div class="stat-item">Win Rate: <span id="rate">0%</span></div>
    </div>

    <button onclick="resetAll()" style="background:none; border:1px solid #333; font-size:0.7rem; color:#555; margin-top:20px; padding:5px 15px;">Reset System</button>
</div>

<script>
    const PASS = "088708!";
    let data = [];
    let winLoss = [];
    let step = 1;
    let betAmount = [10, 20, 40, 80];
    let lastChoice = "";
    let correctCount = 0;

    window.onload = function() {
        let p = prompt("🔐 ใส่รหัสผ่าน VIP:");
        if (p === PASS) { document.getElementById('mainBody').style.display = 'block'; }
        else { alert("รหัสผิด!"); window.location.reload(); }
    };

    function add(x) {
        // เช็คผลแพ้ชนะจากตาที่แล้ว
        if (lastChoice !== "") {
            if (x === lastChoice) {
                winLoss.push('✅');
                correctCount++;
                step = 1; // ทายถูก กลับไปไม้ 1
            } else {
                winLoss.push('❌');
                step++; // ทายผิด ทบไม้
                if (step > 4) step = 1;
            }
        }

        data.push(x);
        renderRoad();
        analyze();
        updateStats();
    }

    function renderRoad() {
        const road = document.getElementById("road");
        road.innerHTML = "";
        let col = 1, row = 1, last = null;

        data.slice(-120).forEach((d) => {
            if (d !== last && last !== null) {
                col++;
                row = 1;
            } else if (d === last) {
                row++;
                if (row > 6) { col++; row = 6; } // หางมังกรเบื้องต้น
            }
            let coin = document.createElement("div");
            coin.className = "coin " + (d === "B" ? "red" : "blue");
            coin.style.gridColumn = col;
            coin.style.gridRow = row;
            coin.innerText = d;
            road.appendChild(coin);
            last = d;
        });
        // Auto scroll ไปขวาสุด
        document.querySelector('.bigroad-container').scrollLeft = 1000;
    }

    function analyze() {
        const nextEl = document.getElementById("next");
        const statusEl = document.getElementById("status");
        const percentEl = document.getElementById("percent");
        const moneyEl = document.getElementById("money");
        const stepEl = document.getElementById("stepDisplay");

        if (data.length < 4) {
            lastChoice = "";
            return;
        }

        let last4 = data.slice(-4).join("");
        let bCount = data.filter(x => x === "B").length;
        let pCount = data.length - bCount;
        let choice = "";
        let prob = 55;

        // สูตร AI ตามที่คุณให้มา
        if (/BBBB|PPPP/.test(last4)) {
            choice = data[data.length - 1]; // ตามมังกร
            prob = 85;
        } else if (/BPBP|PBPB/.test(last4)) {
            choice = data[data.length - 1] === "B" ? "P" : "B"; // สวนปิงปอง
            prob = 80;
        } else if (/BBPP|PPBB/.test(last4)) {
            choice = data[data.length - 4]; // สูตร 2 ตัด
            prob = 75;
        } else {
            choice = (bCount > pCount) ? "B" : "P";
            prob = 60;
        }

        lastChoice = choice;
        statusEl.innerText = "วิเคราะห์เรียบร้อย";
        statusEl.className = "";
        statusEl.style.color = "#4ecca3";
        
        nextEl.innerText = choice;
        nextEl.style.color = (choice === "B" ? "#ef4444" : "#3b82f6");
        percentEl.innerText = "ความแม่นยำ: " + prob + "%";
        moneyEl.innerText = betAmount[step - 1] + " บาท";
        stepEl.innerText = step + " / 4";
    }

    function updateStats() {
        document.getElementById('total').innerText = data.length;
        document.getElementById('wins').innerText = correctCount;
        let totalPredicted = winLoss.length;
        let wr = totalPredicted > 0 ? Math.floor((correctCount / totalPredicted) * 100) : 0;
        document.getElementById('rate').innerText = wr + "%";
    }

    function resetAll() {
        if(confirm("ล้างข้อมูลทั้งหมด?")) {
            data = []; winLoss = []; step = 1; lastChoice = ""; correctCount = 0;
            renderRoad();
            document.getElementById("next").innerText = "?";
            document.getElementById("status").innerText = "⚠️ กรุณากรอกผล 4 ตาแรก";
            document.getElementById("status").className = "warning";
            updateStats();
        }
    }
</script>
</body>
</html>
