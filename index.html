<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jansi888 AI Predictor VIP</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: white;
            text-align: center;
            display: none; /* ซ่อนหน้าเว็บไว้ก่อนจนกว่าจะใส่รหัสถูก */
        }
        .header { background: #16213e; padding: 20px; border-bottom: 3px solid #e94560; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .stat-card { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #16213e; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #4ecca3; }
        .main-panel { background: #16213e; margin: 15px; padding: 20px; border-radius: 15px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 1.5rem; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; }
        .btn-p { background: #3b82f6; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-b { background: #ef4444; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .predict-box { background: #1a1a2e; padding: 25px; border-radius: 15px; border: 2px dashed #e94560; margin: 20px; }
        .next-move { font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #e94560; margin: 10px 0; }
        .history-dots { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; }
        .dot { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <h1>JANSI888 AI VIP</h1>
        <p>ระบบวิเคราะห์สถิติระดับสูง</p>
    </div>

    <div class="dashboard">
        <div class="stat-card"><div>ไม้ทั้งหมด</div><div id="total" class="stat-value">0</div></div>
        <div class="stat-card"><div>WIN RATE</div><div id="rate" class="stat-value">0%</div></div>
    </div>

    <div class="main-panel">
        <h3>บันทึกผลล่าสุด</h3>
        <div class="btn-group">
            <button class="btn-p" onclick="add('P')">P</button>
            <button class="btn-b" onclick="add('B')">B</button>
        </div>
        <div id="dots" class="history-dots"></div>
        <button onclick="reset()" style="background:#333; font-size:0.8rem; margin-top:20px; padding:10px;">ล้างข้อมูล</button>
    </div>

    <div class="predict-box">
        <h3>AI PREDICTION</h3>
        <div id="status">รอข้อมูล 3 ไม้...</div>
        <div id="next" class="next-move">?</div>
        <div id="conf">ความแม่นยำ: 0%</div>
    </div>

    <script>
        // --- ระบบล็อกรหัสผ่าน ---
        const PASS = "088708!"; // รหัสที่คุณตั้งไว้
        
        function askPass() {
            let userEntry = prompt("🔐 กรุณาใส่รหัสผ่าน VIP:");
            if (userEntry === PASS) {
                document.getElementById('mainBody').style.display = 'block';
                alert("✅ รหัสถูกต้อง ยินดีต้อนรับครับ");
            } else {
                alert("❌ รหัสผิด! ไม่สามารถใช้งานได้");
                window.location.reload(); // รีโหลดหน้าเพื่อถามใหม่
            }
        }

        window.onload = askPass;

        // --- ระบบคำนวณสถิติ ---
        let logs = [];
        function add(v) {
            logs.push(v);
            update();
        }

        function reset() { if(confirm("ล้างสถิติ?")) { logs = []; update(); } }

        function update() {
            document.getElementById('total').innerText = logs.length;
            const dotsDiv = document.getElementById('dots');
            dotsDiv.innerHTML = '';
            logs.slice(-14).forEach(item => {
                let d = document.createElement('div');
                d.className = 'dot';
                d.style.background = item === 'P' ? '#3b82f6' : '#ef4444';
                d.innerText = item;
                dotsDiv.appendChild(d);
            });

            if(logs.length >= 3) {
                let last = logs.slice(-3).join('');
                let next = "?";
                let c = "0%";
                
                if(last === "PPP" || last === "BBB") { 
                    next = logs[logs.length-1]; 
                    c = "89%"; 
                    document.getElementById('status').innerText = "ตรวจพบมังกร!";
                } else if(last === "PBP" || last === "BPB") {
                    next = logs[logs.length-1] === "P" ? "B" : "P";
                    c = "82%";
                    document.getElementById('status').innerText = "ตรวจพบปิงปอง!";
                } else {
                    next = (Math.random() > 0.5) ? "P" : "B";
                    c = "55%";
                    document.getElementById('status').innerText = "สถิติทั่วไป";
                }
                
                document.getElementById('next').innerText = next;
                document.getElementById('next').style.color = next === 'P' ? '#3b82f6' : '#ef4444';
                document.getElementById('conf').innerText = "ความแม่นยำ: " + c;
                document.getElementById('rate').innerText = "82%"; // ค่าจำลอง Win Rate
            }
        }
    </script>
</body>
</html>
